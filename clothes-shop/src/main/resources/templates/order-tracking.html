<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Hành Trình Kiện Hàng</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #fff; padding: 40px; margin: 0; color: #333;}
        .tracking-wrapper { max-width: 900px; margin: 0 auto; }
        .header-title { font-size: 40px; font-weight: bold; text-transform: uppercase; margin-bottom: 5px; }
        .order-id { color: #e44d26; font-weight: bold; font-size: 14px; letter-spacing: 1px; }
        
        .main-box { background: #f9f9f9; padding: 40px; border-radius: 8px; margin-top: 30px; display: flex; gap: 40px; }
        
        .status-sec { flex: 6; }
        .status-title { font-size: 24px; font-weight: bold; color: #e44d26; margin-bottom: 30px;}
        
        /* Thanh tiến trình giả lập */
        .progress-bar { display: flex; justify-content: space-between; position: relative; margin-bottom: 50px;}
        .progress-bar::before { content: ''; position: absolute; top: 10px; left: 0; width: 100%; height: 2px; background: #ddd; z-index: 1; }
        .progress-bar::after { content: ''; position: absolute; top: 10px; left: 0; width: 50%; height: 2px; background: #e44d26; z-index: 2; }
        .step { position: relative; z-index: 3; text-align: center; font-size: 12px; font-weight: bold; text-transform: uppercase; width: 80px;}
        .dot { width: 20px; height: 20px; background: #ddd; border-radius: 50%; margin: 0 auto 10px; }
        .step.active .dot { background: #e44d26; }
        
        .map-sec { flex: 4; background: #eee; border-radius: 8px; padding: 20px; text-align: center; }
        .map-img { width: 100%; height: 200px; object-fit: cover; border-radius: 8px; background: #ccc; margin-top: 15px;}
        
        .btn-group { display: flex; gap: 15px; margin-top: 30px; }
        .btn { padding: 12px 25px; border: 1px solid #000; background: transparent; font-weight: bold; cursor: pointer; border-radius: 4px;}
        .btn-dark { background: #000; color: #fff; }
    </style>
</head>
<body>

<div class="tracking-wrapper">
    <div class="order-id">MÃ ĐƠN HÀNG: #DM-9823412</div>
    <div class="header-title">HÀNH TRÌNH<br>KIỆN HÀNG</div>

    <div class="main-box">
        <div class="status-sec">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <div class="status-title">Đang vận chuyển</div>
                <div style="font-weight: bold; font-size: 18px;">Hôm nay</div>
            </div>

            <div class="progress-bar">
                <div class="step active"><div class="dot"></div>Đã xác nhận</div>
                <div class="step active"><div class="dot"></div>Đóng gói</div>
                <div class="step active"><div class="dot"></div>Đang giao</div>
                <div class="step"><div class="dot"></div>Hoàn tất</div>
            </div>

            <div class="btn-group">
                <button class="btn btn-dark">YÊU CẦU HỖ TRỢ</button>
                <button type="button" class="btn" onclick="window.location.href='/products'">VỀ TRANG CHỦ</button>
            </div>
        </div>

        <div class="map-sec">
            <div style="text-align: left; font-weight: bold; font-size: 14px;">VỊ TRÍ CUỐI CÙNG</div>
            <div style="text-align: left; font-size: 18px; margin-top: 5px;">Trạm trung chuyển Quận 9, TP.HCM</div>
            <img src="https://via.placeholder.com/300x200?text=Bản+Đồ+Giao+Hàng" class="map-img" alt="Bản đồ">
            <p style="font-size: 12px; color: #666; margin-top: 15px; text-align: left; font-style: italic;">
                *Kiện hàng của quý khách đã rời kho lúc 09:30 AM và đang được điều phối đến địa chỉ giao hàng.
            </p>
        </div>
    </div>
</div>

</body>
</html>
